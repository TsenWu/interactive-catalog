<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>Golden Way - 授權激活正式版</title>
    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>
    <style>
        body, html { margin: 0; background-color: #333 !important; }
        #container { width: 100%; height: 100vh; }
        /* 強制讓 Canvas 浮現 */
        canvas { 
            display: block !important; 
            visibility: visible !important; 
            background-color: #fff !important; 
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new FlipBook(document.getElementById('container'), {
                pdfUrl: 'https://tsenwu.github.io/interactive-catalog/2023_GW_Greenhouse_Gas_Inventory_Report.pdf', 
                
                // --- 關鍵：填入您的購買代碼，幫助外掛確認授權 ---
                purchaseCode: '0a7fab87-ae7d-4e64-8f9b-c589835f37a7',
                
                // 雲端最強引擎，避開字體渲染崩潰
                pdfWorkerSrc: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js',
                
                // 徹底無視本地 check.php
                checkUrl: '', 
                disableCheck: true,
                
                // 穩定渲染設定
                renderType: 'canvas',
                viewMode: 'swipe', 
                textLayer: true,
                
                // 再次強制禁用字體以防萬一
                disableFontFace: true,
                cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/cmaps/',
                cMapPacked: true
            });
        });
    </script>
</body>
</html>
