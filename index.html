<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Way - 溫室氣體盤查報告書</title>

    <link rel="stylesheet" type="text/css" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <script type="text/javascript">
        // 等待 HTML 結構完全載入後，才開始執行電子書的初始化
        document.addEventListener('DOMContentLoaded', function () {
            // 綁定網頁中的 <div id="container"> 作為電子書的生成容器
            const el = document.getElementById('container');
            
            // options 物件：集中管理所有外掛參數
            const options = {
                // --- 1. 核心檔案與授權 ---
                // 指定要載入的 PDF 檔案路徑 (相對路徑)
                pdfUrl: './2023_GW_Greenhouse_Gas_Inventory_Report.pdf', 
                // 外掛正版授權碼：填入後可解除浮水印並啟用完整商業功能
                // purchaseCode: '0a7fab87-ae7d-4e64-8f9b-c589835f37a7',
                
                // --- 2. 穩定渲染引擎 (防崩潰與效能優化) ---
                // PDF.js 核心引擎來源：指向 GitHub 內 js/libs/ 資料夾下的這個檔案
                pdfWorkerSrc: './js/libs/pdf.worker.min.js',
                // 關閉本地端 PHP 檢查：適合部署在純靜態網頁空間 (如 Vercel、GitHub Pages)
                checkUrl: '', 
                disableCheck: true,
                // 渲染模式：'canvas' (畫布渲染，效能最佳，文字縮放不失真) / 'html' (DOM 渲染)
                renderType: 'canvas',
                
                // 瀏覽模式：
                // 'webgl' (3D 擬真翻頁，具備物理陰影與紙張彎曲感)
                // 'swipe' (水平平滑滑動，無 3D 特效，最適合手機閱讀)
                // 'scrolling' (垂直捲動，像一般網頁往下看)
                // 'simple' (無特效單頁展示)
                viewMode: 'webgl',
                
                // 單頁模式設定：適合強制單面閱讀的排版
                singlePageMode: false, // 電腦版是否強制為單面 (預設雙面展開)
                singlePageModeMobile: true, // 偵測到手機螢幕寬度時，自動切換為單面顯示以保證字體大小

                // 文字層設定：設為 true 允許使用者在畫面上反白選取文字、複製及搜尋
                textLayer: true,
                
                // 中文字體修復機制：防止 PDF 內嵌的特殊中文字體在網頁上變成方塊或亂碼
                disableFontFace: true, // 強制忽略 PDF 自帶的損壞字體，改用系統字體渲染
                cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/cmaps/', // 引入繁體中文編碼解析包
                cMapPacked: true, // 啟用編碼壓縮提升載入速度

                // --- 3. 介面與按鈕佈局 ---
                // 基礎佈景主題：'gradient' (漸層黑/灰色調，適合商務專業感) / 'light' (淺色) / 'dark' (深色)
                skin: 'gradient',
                
                // 頁碼標籤定位：vAlign (垂直) 靠頂部，hAlign (水平) 靠左側
                currentPage: { vAlign: 'top', hAlign: 'left' }, 
                
                // 側邊跳轉按鈕 (首尾頁)：啟用並放置於左右兩側垂直置中的位置
                btnFirst: { enabled: true, vAlign: 'center', hAlign: 'left', icon: 'fa-angle-double-left' }, 
                btnLast: { enabled: true, vAlign: 'center', hAlign: 'right', icon: 'fa-angle-double-right' }, 

                // --- 4. 底部中央工具列配置 ---
                // 控制參數說明：
                // enabled: true (顯示該按鈕) / false (隱藏該按鈕)
                // vAlign: 'bottom' (固定在螢幕最下方)
                // hAlign: 'center' (於下方水平居中排列)
                btnZoomIn:      { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 放大畫面
                btnZoomOut:     { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 縮小畫面
                btnToc:         { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 目錄清單 (Table of Contents)
                btnThumbs:      { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 下方彈出分頁縮圖導覽
                btnShare:       { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 分享至社群或取得網址
                btnBookmark:    { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 新增書籤標記目前頁面
                btnExpand:      { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 切換至全螢幕模式
                btnPrint:       { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 呼叫印表機列印
                btnDownloadPdf: { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 下載完整的 PDF 原始檔
                btnSound:       { enabled: true, vAlign: 'bottom', hAlign: 'center' }, // 開關翻頁時的紙張摩擦音效

                // 隱藏冗餘的下載選項 (避免與上方 btnDownloadPdf 混淆)
                btnDownloadPages: { enabled: false }, // 關閉「將每頁轉為圖片並打包成 ZIP 下載」的功能
                
                // --- 5. 工具列外觀樣式細部設定 ---
                menuMargin: 0,           // 選單外部間距：設為 0 讓黑底完全貼齊螢幕最底端，不留空隙
                menuTransparent: false,  // 透明度開關：設為 false 確保底欄有實體的漸層顏色，不會透出底下的書本
                menuOverBook: false,     // 物理防遮擋機制：設為 false 強制劃分「書本區」與「底欄區」，確保書本放大時不會被底下的工具列擋住
                btnColor: '#FFFFFF',     // 按鈕圖標統一顏色：#FFFFFF 代表純白色
                btnRadius: 0             // 按鈕背景圓角弧度：設為 0 維持專業化方正邊緣，數值越大越圓潤 (例如 10 為微圓角)
            };
            
            // 執行初始化，將上述 options 設定灌入 container 容器中
            new FlipBook(el, options);
        });
    </script>

    <style>
        /* --- A. 基礎畫布設定 --- */
        body, html {
            margin: 0; padding: 0; /* 消除瀏覽器預設的白邊 */
            overflow: hidden; /* 鎖死網頁本身的滾動條，全部交由電子書內部滑動 */
            background-color: #333 !important; /* 設定網頁最底層的顏色為深灰色 */
            height: 100% !important; /* 強制佔滿螢幕高度 */
        }
        
        /* 承載電子書的容器，設定為滿版寬高 */
        #container { width: 100%; height: 100vh; }
        
        /* 強制 Canvas (實際渲染 PDF 畫面的畫布) 顯示設定 */
        canvas { 
            display: block !important; 
            visibility: visible !important; 
            /* 讓書本後方的背景色也是深灰色 (#494949)，與外圍的 #333 形成微小的層次感 */
            background-color: #494949 !important; 
        }

        /* --- B. 頂部中央 Logo 區塊 (獨立懸浮層) --- */
        .top-center-logo {
            position: absolute; /* 絕對定位，使其脫離常規排版，懸浮於畫面上方 */
            top: 15px; /* 距離頂部 15px，對齊左上角的頁碼標籤 */
            left: 50%; /* 推到畫面一半的距離 */
            transform: translateX(-50%); /* 往回拉自身寬度的一半，達成完美的絕對置中 */
            background-color: rgba(0, 0, 0, 0.7); /* 70% 不透明度的純黑底色 */
            padding: 6px 20px; /* 內邊距：上下 6px，左右 20px，撐開背景框 */
            border-radius: 4px; /* 4px 圓角，使邊緣不那麼銳利 */
            z-index: 150; /* 確保圖層順序在電子書之上 (外掛預設層級約 100 左右) */
            
            /* 【核心技巧】指標事件穿透：讓滑鼠點擊不會被此區塊攔截，保證能點到下方的書本進行翻頁 */
            pointer-events: none; 
            
            display: flex; align-items: center; justify-content: center; /* 讓內部的圖片精準置中 */
        }
        /* Logo 圖片本身的控制 */
        .top-center-logo img { 
            height: 22px; /* 鎖定視覺高度，寬度(auto)會依比例自動縮放 */
            display: block; 
        }

        /* --- C. RWD 響應式設計 (針對手機與小螢幕優化) --- */
        /* 當螢幕寬度小於 768px (平板/手機尺寸) 時，觸發以下樣式縮小 Logo 體積 */
        @media (max-width: 768px) {
            .top-center-logo { top: 10px; padding: 4px 15px; } /* 減少上方距離與內邊距 */
            .top-center-logo img { height: 16px; } /* 將 Logo 高度縮小，避免佔據過多手機閱讀空間 */
        }

        /* --- D. 左上角頁碼標籤 (外觀覆寫) --- */
        .flipbook-currentPage {
            background-color: rgba(0, 0, 0, 0.7) !important; /* 統一為 70% 不透明度黑底 */
            color: #ffffff !important; /* 白色字體 */
            padding: 6px 15px !important;
            border-radius: 4px !important;
            top: 15px !important; /* 與頂部 Logo 的高度完美對齊 */
            left: 15px !important;
            font-family: Arial, sans-serif !important; /* 使用乾淨的無襯線字體 */
            font-size: 14px !important;
            z-index: 100 !important;
        }

        /* --- E. 底部全寬漸層工具列 (結構重塑) --- */
        .flipbook-menu-bottom {
            /* 繪製由上往下的漸層：從 80% 黑過渡到純黑，創造立體底座感 */
            background: linear-gradient(to top, rgba(40,40,40,0.8) 0%, rgba(0,0,0,1) 100%) !important;
            height: 60px !important; /* 固定高度為 60px */
            width: 100% !important; /* 強制佔滿左右寬度，破除外掛預設的短版設計 */
            left: 0 !important;
            display: flex !important; align-items: center !important; justify-content: center !important; /* 將內部所有按鈕擠在正中間 */
            padding: 0 !important; margin: 0 !important;
            /* 在底欄上方畫一條極細的 10% 透明白線，做為與畫布的視覺分割線 */
            border-top: 1px solid rgba(255,255,255,0.1); 
        }

        /* --- F. 側邊跳轉按鈕 (首頁/末頁按鈕微調) --- */
        .flipbook-btnFirst, .flipbook-btnLast {
            background: rgba(0, 0, 0, 0.3) !important; /* 賦予 30% 透明黑的圓形背景，增加在白色書本旁的辨識度 */
            border-radius: 50% !important; /* 強制變為正圓形 */
            padding: 10px !important; /* 擴大按鈕可點擊範圍 */
            margin: 10px 15px !important; /* 將按鈕向內推，避免與外掛自帶的翻頁箭頭靠得太近而誤觸 */
            position: relative !important; 
            top: 20px !important; /* 在垂直置中的基礎上，稍微往下微調 20px 達到最佳視覺平衡 */
        }

        /* --- G. 全局按鈕統一設定 --- */
        /* 針對所有功能按鈕的共用樣式 */
        .flipbook-btn {
            background: none !important; /* 清除所有個別按鈕自帶的背景色 */
            color: #ffffff !important; /* 強制圖示為白色 */
            font-size: 20px !important; /* 統一字體圖標的大小，確保點擊舒適度 */
        }
    </style>
</head>

<body>
    <div class="top-center-logo">
        <img src="./GW_logo_W.png" alt="Golden Way Logo">
    </div>
    
    <div id="container"></div>
</body>
</html>
