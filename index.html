<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="./css/flipbook.min.css" />
        
        <script src="./js/flipbook.min.js"></script>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('container');
    new FlipBook(el, {
        pdfUrl: './test2.pdf',
        // 必須明確指定 Worker 的位置，否則引擎會因為找不到助手而畫不出圖
        pdfWorkerSrc: './js/libs/pdf.worker.min.js', 
        // 即使是圖像版 PDF，有時也需要這行來初始化渲染環境
        cMapUrl: './assets/cmaps/',
        cMapPacked: true,
        // 增加容錯率
        disableCanvasSideBySide: true 
    });
});
        </script>
        
        <style>
            body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #333; }
            #container { width: 100%; height: 100vh; }
        </style>
    </head>

    <body>
        <div id="container"></div>
    </body>
</html>
