<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Flipbook 專業測試版</title>

    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background-color: #333; height: 100%; overflow: hidden; }
        #container { width: 100%; height: 100vh; }
        
        /* 確保 PDF 渲染層級正確 */
        .flipbook-page-canvas, canvas {
            display: block !important;
            visibility: visible !important;
            background-color: #ffffff !important;
        }
    </style>
</head>

<body>
    <div id="container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new FlipBook(document.getElementById('container'), {
                // --- 1. 檔案路徑設定 ---
                // 請將下方檔名改為您的「範例 PDF」檔名
                pdfUrl: './sample.pdf', 
                
                // --- 2. 渲染引擎優化 (使用雲端穩定版解決字體錯誤) ---
                pdfWorkerSrc: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js',
                
                // --- 3. 靜態環境相容性設定 (跳過 GitHub/Netlify 不支援的 PHP 檢查) ---
                checkUrl: 'stop_check', 
                disableCheck: true,
                
                // --- 4. 恢復官方進階功能 ---
                viewMode: 'webgl',        // 啟動 3D 翻頁效果
                renderType: 'canvas',     // 使用畫布渲染以支援搜尋
                textLayer: true,          // 啟動文字選取與搜尋層
                btnSearch: { enabled: true }, // 開啟搜尋按鈕
                
                // --- 5. 中文字體與編碼支援 ---
                cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/cmaps/',
                cMapPacked: true,
                
                // --- 6. 其他細節設定 ---
                webgl: true,              // 嘗試開啟 WebGL 提升流暢度
                singlePageMode: false     // 預設為雙頁顯示
            });
        });
    </script>
</body>
</html>
