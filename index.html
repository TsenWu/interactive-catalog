<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoldenWay - 互動型錄最終修復版</title>

    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1a; overflow: hidden; }
        #container { width: 100%; height: 100vh; }

        /* --- 暴力破除所有可能的白色遮蓋層 --- */
        
        /* 1. 讓所有翻頁容器背景完全透明 */
        .flipbook-main-wrapper, 
        .flipbook-container, 
        .flipbook-book, 
        .flipbook-page, 
        .flipbook-page-html,
        .flipbook-textLayer,
        .flipbook-page-content {
            background: transparent !important;
            background-color: transparent !important;
        }

        /* 2. 確保文字層不會擋住下方的畫布 */
        .flipbook-textLayer {
            z-index: 10 !important;
            mix-blend-mode: multiply; /* 關鍵：讓文字層與下方顏色混合 */
        }

        /* 3. 強制讓畫布層（圖像）浮現 */
        .flipbook-page-canvas, canvas {
            display: block !important;
            visibility: visible !important;
            z-index: 1 !important;
            background: #fff !important; /* 唯獨讓畫布底色是白的 */
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('container');
            
            new FlipBook(el, {
                // 測試時先用您的 ./test.pdf，這份代碼已修正渲染邏輯
                pdfUrl: './test.pdf', 
                pdfWorkerSrc: './js/libs/pdf.worker.min.js',
                
                // --- 穩定性強制參數 ---
                viewMode: 'swipe',      // 1. 先用 swipe 模式排除 3D 座標偏差
                renderType: 'canvas',   // 2. 強制使用畫布模式
                textLayer: true,        // 3. 保持文字可選
                
                // --- 靜態環境修正 ---
                checkUrl: null,         // 徹底禁用 check.php 請求
                disableCheck: true,
                
                // --- 相容性設定 ---
                cMapUrl: './assets/cmaps/',
                cMapPacked: true,
                webgl: false,           // 暫時關閉 WebGL，避免顯卡相容性導致的白屏
                
                // --- 縮放優化 ---
                zoomMin: 0.8,
                pageTextureSize: 2048   // 確保解析度足夠
            });
        });
    </script>
</head>
<body>
    <div id="container"></div>
</body>
</html>
