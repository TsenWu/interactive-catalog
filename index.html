<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoldenWay - 深度修復測試</title>

    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <style>
        /* 基礎黑背景 */
        body, html { background-color: #1a1a1a !important; margin: 0; }
        #container { width: 100%; height: 100vh; }

        /* --- 核心修復：把所有翻頁套件的「白牆」全部推倒 --- */
        
        /* 強制將所有 flipbook 開頭的元件背景設為透明 */
        [class^="flipbook-"] {
            background-color: transparent !important;
            background: transparent !important;
        }

        /* 唯獨讓畫布層（Canvas）強行顯示在最前方 */
        .flipbook-page-canvas, canvas {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 5 !important; /* 確保它在中間層 */
            background-color: #fff !important; /* 畫布底色設為白，確保圖片清晰 */
        }

        /* 讓文字層疊在最上面，但不准有背景色 */
        .flipbook-textLayer {
            z-index: 10 !important;
            background: none !important;
            background-color: transparent !important;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new FlipBook(document.getElementById('container'), {
                pdfUrl: './test.pdf', 
                pdfWorkerSrc: './js/libs/pdf.worker.min.js',
                
                // 關閉 3D 複雜光影，先確保看得到內容
                viewMode: 'swipe', 
                renderType: 'canvas',
                
                // 徹底關閉 PHP 請求，防止 check.php 返回 HTML 錯誤內容
                checkUrl: 'ignore_me', 
                
                // 提高渲染權重
                textLayer: true,
                webgl: false,
                
                // 字體對應檔
                cMapUrl: './assets/cmaps/',
                cMapPacked: true
            });
        });
    </script>
</head>
<body>
    <div id="container"></div>
</body>
</html>
