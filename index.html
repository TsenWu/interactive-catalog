<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoldenWay - 互動型錄專業版</title>

    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <style>
        /* 1. 舞台背景設定 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #2c2c2c !important; }
        #container { width: 100%; height: 100vh; }

        /* 2. 強制破除原廠 CSS 的白牆設定 */
        .flipbook-wrapper, 
        .flipbook-page3, 
        .flipbook-page-html,
        .flipbook-page-content {
            background: transparent !important;
            background-color: transparent !important;
            box-shadow: none !important;
        }

        /* 3. 強制讓畫布圖像顯現 */
        .flipbook-page-canvas, canvas {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 1 !important;
            background-color: #ffffff !important; /* 確保畫布底色是白的 */
        }

        /* 4. 修正文字層：確保透明且位於最前供選取 */
        .flipbook-textLayer {
            opacity: 1 !important;
            background: transparent !important;
            z-index: 10 !important;
            pointer-events: auto !important;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new FlipBook(document.getElementById('container'), {
                // 指向您的 PDF 檔案
                pdfUrl: 'testA.pdf', 
                pdfWorkerSrc: './js/libs/pdf.worker.min.js',
                
                // --- 靜態環境必備設定：封鎖 check.php ---
                checkUrl: 'none', 
                disableCheck: true,
                
                // --- 恢復原廠高級 3D 模式 ---
                viewMode: 'webgl', 
                renderType: 'html',
                textLayer: true, // 恢復文字搜尋與選取
                
                // --- 相容性優化 ---
                cMapUrl: './assets/cmaps/',
                cMapPacked: true,
                webgl: true,
                
                // 關閉深度連結排除干擾
                deepLinking: false 
            });
        });
    </script>
</head>
<body>
    <div id="container"></div>
</body>
</html>
