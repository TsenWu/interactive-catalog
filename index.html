<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoldenWay 型錄 - 穩定版</title>

    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background-color: #333; height: 100%; overflow: hidden; }
        #container { width: 100%; height: 100vh; }
        
        /* 強制確保 Canvas（圖片層）可見，並排在文字層下方 */
        .flipbook-page-canvas, canvas {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 1 !important;
        }
        /* 讓文字層透明且排在上方 */
        .flipbook-textLayer {
            background-color: transparent !important;
            z-index: 2 !important;
        }
    </style>
</head>

<body>
    <div id="container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new FlipBook(document.getElementById('container'), {
                // 指向您的報告檔案（請確認 GitHub 上的檔名與此完全一致，包含大小寫）
                pdfUrl: './2023_GW_Greenhouse_Gas_Inventory_Report.pdf', 
                
                // --- 改回使用您本地資料夾內的解析引擎 ---
                pdfWorkerSrc: './js/libs/pdf.worker.min.js',
                
                // 徹底無視 PHP 請求，避免 GitHub Pages 報錯
                checkUrl: '', 
                disableCheck: true,
                
                // 穩定模式：關閉 WebGL 以提升相容性
                viewMode: 'swipe',
                renderType: 'canvas',
                textLayer: true,
                webgl: false,
                
                // 使用您本地的字體對應檔資料夾
                cMapUrl: './assets/cmaps/',
                cMapPacked: true
            });
        });
    </script>
</body>
</html>
